---
- name: Enable unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

- name: Install logrotate
  ansible.builtin.apt:
    name: logrotate
    state: present

- name: Configure logrotate for pi-orchestrator logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/projets
    owner: root
    group: root
    mode: "0644"
    content: |
      /opt/projets/logs/*.log {
          weekly
          rotate 8
          compress
          missingok
          notifempty
          copytruncate
      }

- name: Prune Docker weekly cron
  ansible.builtin.copy:
    dest: /etc/cron.weekly/docker-prune
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      docker system prune -af --volumes